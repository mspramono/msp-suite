<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuaraBuku - Pembaca File Online Tanpa Server</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-slate-800 p-6 rounded-2xl shadow-2xl w-full max-w-xl border border-slate-700">
        <h1 class="text-3xl font-extrabold text-center text-indigo-400 mb-2">📖 SuaraBuku</h1>
        <p class="text-center text-xs text-slate-400 mb-6">Proses 100% aman di perangkatmu tanpa upload ke server</p>
        
        <div id="upload-section" class="space-y-4">
            <div id="drop-zone" class="border-2 border-dashed border-slate-600 rounded-xl p-8 text-center hover:border-indigo-500 transition cursor-pointer bg-slate-850">
                <input type="file" id="file-input" class="hidden" accept=".pdf,.docx">
                <label for="file-input" class="cursor-pointer block">
                    <span class="text-indigo-400 font-semibold text-lg block mb-1">Pilih atau Seret File</span>
                    <span class="text-sm text-slate-400 block">Mendukung PDF & Word (.docx)</span>
                    <span class="text-xs text-amber-400 block mt-2">⚠️ Bebas file besar, diproses lokal di memorimu!</span>
                </label>
            </div>
            
            <div id="upload-status-alert" class="hidden text-center p-3 rounded-lg text-sm font-medium"></div>

            <button onclick="processFile()" id="btn-process" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold transition shadow-lg flex items-center justify-center space-x-2">
                <span id="btn-text">Proses & Hitung Halaman</span>
            </button>
        </div>

        <div id="control-section" class="hidden space-y-6">
            <div class="flex justify-between items-center p-3 bg-slate-750 rounded-xl border border-slate-700 text-sm">
                <div>Total: <span id="total-pages" class="font-bold text-indigo-400">0</span> Halaman</div>
                <div class="space-x-2">
                    <button onclick="refreshApp()" class="text-amber-400 hover:underline">🔄 Refresh</button>
                    <button onclick="backToUpload()" class="text-slate-400 hover:underline">⬅️ Kembali</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Mulai Halaman:</label>
                    <input type="number" id="start-page" min="1" value="1" onchange="updateTimelineBoundaries()" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-center text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Sampai Halaman:</label>
                    <input type="number" id="end-page" min="1" value="1" onchange="updateTimelineBoundaries()" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-center text-white focus:outline-none focus:border-indigo-500">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Bahasa Voice Over:</label>
                <select id="lang-select" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-white focus:outline-none focus:border-indigo-500">
                    <option value="id-ID">Bahasa Indonesia</option>
                    <option value="en-US">English (US)</option>
                </select>
            </div>

            <button onclick="startReading()" id="btn-speak" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold transition shadow-lg text-lg">
                🔊 Mulai Bacakan Buku
            </button>

            <div id="audio-player" class="hidden border-t border-slate-700 pt-4 space-y-4">
                <div class="space-y-1">
                    <div class="flex justify-between text-xs text-slate-400">
                        <span>Halaman Ke: <span id="current-timeline-page" class="text-indigo-400 font-bold">1</span></span>
                        <span>Target: Hal <span id="target-timeline-max">1</span></span>
                    </div>
                    <input type="range" id="audio-timeline" min="1" max="1" value="1" onmousedown="isUserSeeking=true" oninput="document.getElementById('current-timeline-page').innerText = this.value;" onchange="seekToPage(this.value)" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                </div>

                <p id="reading-status" class="text-center text-sm text-amber-400 font-medium bg-slate-900/55 py-2 rounded-lg border border-slate-750">Menyiapkan suara...</p>
                
                <div class="flex justify-center space-x-4">
                    <button onclick="pauseSpeech()" class="w-1/2 bg-amber-500 hover:bg-amber-600 text-slate-900 py-3 rounded-xl font-bold transition shadow-md">Pause</button>
                    <button onclick="resumeSpeech()" class="w-1/2 bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-xl font-bold transition shadow-md">Play/Resume</button>
                </div>

                <div class="flex justify-center items-center space-x-2 text-sm bg-slate-750 p-2 rounded-lg border border-slate-700">
                    <span class="text-slate-400">Kecepatan:</span>
                    <button onclick="setSpeed(1)" class="bg-slate-700 px-4 py-1 rounded hover:bg-slate-600 text-xs font-semibold">1x</button>
                    <button onclick="setSpeed(1.3)" class="bg-slate-700 px-4 py-1 rounded hover:bg-slate-600 text-xs font-semibold">1.3x</button>
                    <span id="speed-indicator" class="text-indigo-400 font-bold ml-2">(1x)</span>
                </div>

                <div class="bg-slate-750 p-3 rounded-lg border border-slate-700 text-center">
                    <p class="text-xs text-slate-400 mb-2">📥 Unduh Teks Narasi Rentang Aktif: Mengekstrak teks bersih dari halaman terpilih untuk dokumentasi audio Anda.</p>
                    <button onclick="downloadFullAudioRange()" id="btn-download" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-2 rounded-lg text-sm font-semibold transition shadow">
                        📥 Unduh Teks Rentang Halaman (.txt)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let extractedPagesText = []; 
        let synth = window.speechSynthesis;
        let utterance = null;
        let currentSpeed = 1;
        let currentPagePlayingIdx = 0;
        let isUserSeeking = false;
        let isPaused = false;
        
        let textChunks = [];
        let currentChunkIdx = 0;
        let pauseTimeout = null;

        function initVoices() {
            if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
                synth.getVoices();
            }
        }
        initVoices();
        window.speechSynthesis.onvoiceschanged = initVoices;

        // Reset terstruktur khusus mobile: Menghentikan audio tanpa menghancurkan properti instans inti
        function cleanSpeechControl() {
            clearTimeout(pauseTimeout);
            if (synth) {
                synth.cancel();
            }
        }

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        if (dropZone && fileInput) {
            dropZone.onclick = () => fileInput.click();
            dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-indigo-500'); };
            dropZone.ondragleave = () => dropZone.classList.remove('border-indigo-500');
            dropZone.ondrop = (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-indigo-500');
                if(e.dataTransfer.files.length > 0) {
                    fileInput.files = e.dataTransfer.files;
                    handleFileSelectionVisuals();
                }
            };
            fileInput.onchange = () => { handleFileSelectionVisuals(); };
        }

        function handleFileSelectionVisuals() {
            const alertBox = document.getElementById('upload-status-alert');
            if (fileInput.files.length > 0) {
                alertBox.className = "text-center p-3 rounded-lg text-sm font-medium bg-emerald-950 text-emerald-400 border border-emerald-800";
                alertBox.innerText = `✔️ Berhasil memuat file: "${fileInput.files[0].name}". Silakan klik tombol proses.`;
                alertBox.classList.remove('hidden');
            }
        }

        async function processFile() {
            if (!fileInput.files.length) return alert("Silakan pilih file terlebih dahulu!");
            const file = fileInput.files[0];

            const btnText = document.getElementById('btn-text');
            btnText.innerText = "⏳ Mengekstrak seluruh isi halaman dokumen... Mohon Tunggu...";
            document.getElementById('btn-process').disabled = true;

            extractedPagesText = [];

            try {
                const fileExtension = file.name.split('.').pop().toLowerCase();

                if (fileExtension === 'pdf') {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(' ');
                        extractedPagesText.push(pageText);
                    }
                } else if (fileExtension === 'docx') {
                    const arrayBuffer = await file.arrayBuffer();
                    const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                    const fullText = result.value;
                    const chunks = fullText.match(/[\s\S]{1,1200}/g) || [fullText];
                    extractedPagesText = chunks;
                }

                if(extractedPagesText.length === 0 || extractedPagesText.join('').trim() === "") {
                    throw new Error("Gagal mengambil teks atau dokumen kosong.");
                }

                document.getElementById('total-pages').innerText = extractedPagesText.length;
                document.getElementById('end-page').value = extractedPagesText.length;
                
                updateTimelineBoundaries();

                document.getElementById('upload-section').classList.add('hidden');
                document.getElementById('control-section').classList.remove('hidden');

            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                btnText.innerText = "Proses & Hitung Halaman";
                document.getElementById('btn-process').disabled = false;
            }
        }

        function updateTimelineBoundaries() {
            const startPage = parseInt(document.getElementById('start-page').value) || 1;
            const endPage = parseInt(document.getElementById('end-page').value) || extractedPagesText.length;
            
            const timeline = document.getElementById('audio-timeline');
            timeline.min = startPage;
            timeline.max = endPage;
            timeline.value = startPage;
            document.getElementById('current-timeline-page').innerText = startPage;
            document.getElementById('target-timeline-max').innerText = endPage;
        }

        function seekToPage(pageValue) {
            isUserSeeking = true;
            currentPagePlayingIdx = parseInt(pageValue) - 1;
            currentChunkIdx = 0;
            
            cleanSpeechControl();
            
            setTimeout(() => {
                isPaused = false;
                isUserSeeking = false;
                preparePageChunks();
                playChunkSequence();
            }, 150); 
        }

        function startReading() {
            cleanSpeechControl();
            isPaused = false;
            isUserSeeking = false;
            currentPagePlayingIdx = parseInt(document.getElementById('start-page').value) - 1;
            currentChunkIdx = 0;

            document.getElementById('audio-player').classList.remove('hidden');
            preparePageChunks();
            playChunkSequence();
        }

        // Tokenizer Teks Kebal Error: Memotong kalimat menjadi string murni tanpa membungkus objek
        function preparePageChunks() {
            let rawText = extractedPagesText[currentPagePlayingIdx] || "";
            textChunks = [];

            // Ganti baris baru dan tabulasi ekstrim menjadi spasi tunggal agar hardware HP tidak tersedak
            rawText = rawText.replace(/[\r\n\t]+/g, ' ').replace(/\s+/g, ' ');

            // Potong teks berdasarkan tanda baca secara aman
            let sentences = rawText.match(/[^,.;?!]+[,.;?!]?/g) || [rawText];
            
            sentences.forEach(sentence => {
                let trimmed = sentence.trim();
                // Lewati string kosong agar tidak memicu pemblokiran silent bug pada mobile browser
                if (trimmed.length > 0) {
                    textChunks.push(trimmed);
                }
            });

            if (textChunks.length === 0) {
                textChunks.push("Halaman kosong atau tidak ada teks.");
            }
        }

        function playChunkSequence() {
            if (isPaused || isUserSeeking) return;

            const endPage = parseInt(document.getElementById('end-page').value) - 1;
            
            if (currentChunkIdx >= textChunks.length) {
                currentPagePlayingIdx++;
                currentChunkIdx = 0; 
                
                if (currentPagePlayingIdx > endPage) {
                    document.getElementById('reading-status').innerText = "🏁 Selesai membacakan seluruh rentang halaman.";
                    cleanSpeechControl();
                    return;
                }
                preparePageChunks();
            }

            document.getElementById('audio-timeline').value = currentPagePlayingIdx + 1;
            document.getElementById('current-timeline-page').innerText = currentPagePlayingIdx + 1;

            let currentText = textChunks[currentChunkIdx];
            if (!currentText) {
                currentChunkIdx++;
                playChunkSequence();
                return;
            }

            document.getElementById('reading-status').innerText = `🔊 Halaman ${currentPagePlayingIdx + 1} (Kalimat ${currentChunkIdx + 1}/${textChunks.length}): "${currentText.substring(0, 50)}..."`;

            utterance = new SpeechSynthesisUtterance(currentText);
            
            const selectedLang = document.getElementById('lang-select').value;
            utterance.lang = selectedLang;
            utterance.rate = currentSpeed;

            const voices = synth.getVoices();
            let matchedVoice = voices.find(v => v.lang.toLowerCase().replace('_', '-') === selectedLang.toLowerCase()) ||
                               voices.find(v => v.lang.startsWith(selectedLang.split('-')[0]));
            if (matchedVoice) {
                utterance.voice = matchedVoice;
            }

            // Pemicu Native Berantai yang Ringan
            utterance.onend = () => {
                if (!isPaused && !isUserSeeking) {
                    currentChunkIdx++; 
                    // Memberikan delay napas mikro 80ms untuk membersihkan antrean audio internal HP
                    pauseTimeout = setTimeout(playChunkSequence, 80);
                }
            };

            utterance.onerror = (e) => {
                console.warn("TTS Event Notice:", e.error);
                if (e.error === 'interrupted') return;
                if (!isPaused && !isUserSeeking) {
                    currentChunkIdx++;
                    pauseTimeout = setTimeout(playChunkSequence, 80);
                }
            };

            synth.speak(utterance);
        }

        function pauseSpeech() {
            if (!isPaused) {
                isPaused = true;
                clearTimeout(pauseTimeout);
                if (synth) {
                    synth.cancel();
                }
                document.getElementById('reading-status').innerText = "⏸️ Pembacaan sedang dipause";
            }
        }

        function resumeSpeech() {
            if (isPaused) {
                isPaused = false;
                document.getElementById('reading-status').innerText = "🔊 Memulai kembali pembacaan...";
                playChunkSequence();
            }
        }

        function setSpeed(speed) {
            currentSpeed = speed;
            document.getElementById('speed-indicator').innerText = `(${speed}x)`;
            
            if (synth.speaking && !isPaused) {
                cleanSpeechControl();
                setTimeout(() => {
                    playChunkSequence(); 
                }, 150);
            }
        }

        function downloadFullAudioRange() {
            const startPage = parseInt(document.getElementById('start-page').value) || 1;
            const endPage = parseInt(document.getElementById('end-page').value) || extractedPagesText.length;
            
            const totalToDownload = (endPage - startPage) + 1;
            if (totalToDownload > 25) {
                return alert(`⚠️ Batas maksimal pengunduhan sekali jalan adalah 25 halaman.`);
            }

            const downloadBtn = document.getElementById('btn-download');
            downloadBtn.innerText = "⏳ Mendownload Teks...";
            downloadBtn.disabled = true;

            try {
                let txtContent = `--- SUARA BUKU TEKS EKSTRAKSI (HALAMAN ${startPage} - ${endPage}) ---\n\n`;
                for (let i = startPage - 1; i < endPage; i++) {
                    if (extractedPagesText[i]) {
                        txtContent += `[HALAMAN ${i + 1}]\n${extractedPagesText[i]}\n\n`;
                    }
                }

                const blob = new Blob([txtContent], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `TeksNarasi_SuaraBuku_Halaman_${startPage}_sampai_${endPage}.txt`;
                a.click();
                URL.revokeObjectURL(url);

                alert("✔️ File Teks Narasi Berhasil Terunduh Sempurna!");
            } catch (err) {
                alert("Gagal mendownload: " + err.message);
            } finally {
                downloadBtn.innerText = "📥 Unduh Teks Rentang Halaman (.txt)";
                downloadBtn.disabled = false;
            }
        }

        function backToUpload() {
            isPaused = false;
            isUserSeeking = false;
            cleanSpeechControl();
            document.getElementById('upload-section').classList.remove('hidden');
            document.getElementById('control-section').classList.add('hidden');
            document.getElementById('audio-player').classList.add('hidden');
            document.getElementById('upload-status-alert').classList.add('hidden');
            document.getElementById('file-input').value = "";
        }

        function refreshApp() {
            cleanSpeechControl();
            location.reload();
        }
    </script>
</body>
</html>
